# YAML file to create inputModelNameConcept.def and inputModelVersionConcept.def
#
# - extra_keys: to include for an entry extra grib keys, blockwise or element-wise
# - override_id: overwrites the id by the defined one
# - skip: if a version was skipped an the id should jump, use skip
# - null: if no version none, takes only the model name as version entry
#
# -- EXAMPLE
#
#models:
#  - name: XY
#    start: 1
#    extra_keys:
#      class: od              # block-level extra keys, applied to all versions unless overridden
#    versions:
#      - version: v1.0.0      # id=1
#        extra_keys:
#          centre: 98         # per-version extra key
#      - version: v2.0.0
#        override_id: 20     # special ID override -> id=20
#      - version: skipped
#        skip: true            # this version is skipped, not assigned, included in increment counter
#      - null                   # version omitted → uses model name -> id=3

